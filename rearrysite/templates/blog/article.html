{% extends "mysite/base.html" %}

{% block content %}
    <main class="container">
        <div class="row">
            <div class="col-md-8">
                <h3 class="pb-4 mb-4 font-italic border-bottom">Django Lesson</h3>

                {% for obj in articles %}
                    <div class="blog-post">
                        <h2 class="blog-post-title">{{ obj.title }}</h2>
                        <p class="blog-post-meta">{{ obj.created_at }} by <a href="#">{{ obj.author }}</a></p>

                        <p>{{ obj.text }}</p>
                    </div>
                    
                {% endfor %}

                <nav class="blog-pagination">
                    <a class="btn btn-outline-primary" href="#">Old Article</a>
                    <a class="btn btn-outline-secondary disabled" href="#">New Article</a>
                </nav>
            </div>

            <aside class="col-md-4">
                <div class="p-4 mb-3 bg-light rounded">
                    <h4 class="font-italic">About me</h4>
                    <p class="mb-0">Welcome</p>
                </div>
            </aside>
        </div>
    </main>
{% endblock content %}
